name: Apartment Price Monitor

on:
  schedule:
    # Runs at 8am and 6pm Central time (13:00 and 23:00 UTC)
    - cron: "0 13 * * *"
    - cron: "0 23 * * *"
  workflow_dispatch:  # lets you trigger it manually from GitHub UI

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          # Need write access to commit updated price file
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Restore last known prices
        # Prices are committed to the repo so they persist between runs
        run: |
          if [ -f last_prices.json ]; then
            echo "Found existing price history"
            cat last_prices.json
          else
            echo "No price history yet — first run"
          fi

      - name: Run monitor
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: python monitor.py

      - name: Commit updated prices
        run: |
          git config user.name "apt-monitor-bot"
          git config user.email "bot@github-actions"
          git add last_prices.json
          git diff --staged --quiet || git commit -m "price snapshot $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
